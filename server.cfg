# =============================================================================
# NJC – FiveM xprp Server Configuration
# =============================================================================

# ── Server Identity ───────────────────────────────────────────────────────────
sv_hostname "NJC xprp | Roleplay Server"
sv_projectName "NJC xprp"
sv_projectDesc "Earn XP and cash for play time and clean roleplay"

# ── Network ───────────────────────────────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ── Player Slots ──────────────────────────────────────────────────────────────
sv_maxclients 64

# ── License Key ───────────────────────────────────────────────────────────────
# REQUIRED: Obtain your key at https://keymaster.fivem.net/
# The server will NOT start without a valid license key.
sv_licenseKey "change_me"

# ── Database (oxmysql) ────────────────────────────────────────────────────────
# Replace with your actual DB credentials. Do NOT commit real passwords.
set mysql_connection_string "mysql://njc_user:your_secure_password@localhost/njc_xprp?waitForConnections=true"

# ── Steam Web API (optional) ──────────────────────────────────────────────────
# set steam_webApiKey "YOUR_STEAM_WEB_API_KEY"

# ── OneSync ───────────────────────────────────────────────────────────────────
# set onesync on

# ── Convars available to all resources ────────────────────────────────────────
setr locale "en"
set xprp_debug "false"

# =============================================================================
# Resources
# =============================================================================

# ── Database driver ───────────────────────────────────────────────────────────
ensure oxmysql

# ── Core framework ────────────────────────────────────────────────────────────
ensure xprp-core

# ── Essential utilities ───────────────────────────────────────────────────────
ensure spawnmanager

# ── Gameplay scripts ──────────────────────────────────────────────────────────
# Awards XP and cash for play time + clean gameplay
ensure xprp-playtime

# =============================================================================
# Permissions / ACE
# =============================================================================

add_ace group.admin command allow
add_ace group.admin command.quit allow
# Replace the Steam hex below with your own identifier
add_principal identifier.steam:110000100000001 group.admin
