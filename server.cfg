# =============================================================================
# NJC – FiveM xprp Server Configuration
# =============================================================================

# ── Server Identity ──────────────────────────────────────────────────────────
sv_hostname "NJC xprp | Roleplay Server"
sv_projectName "NJC xprp"
sv_projectDesc "A serious roleplay experience on FiveM"

# ── Network ──────────────────────────────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ── Player Slots ─────────────────────────────────────────────────────────────
sv_maxclients 64

# ── License Key ──────────────────────────────────────────────────────────────
# REQUIRED: Obtain your key at https://keymaster.fivem.net/
# The server will NOT start without a valid license key.
sv_licenseKey "change_me"

# ── Database (oxmysql) ───────────────────────────────────────────────────────
# Replace with your actual DB user, password, host, and database name.
# Do NOT use the root account or a weak password in production.
set mysql_connection_string "mysql://njc_user:your_secure_password@localhost/njc_xprp?waitForConnections=true"

# ── Steam Web API ────────────────────────────────────────────────────────────
# Steam authentication is NOT required when players connect via Rockstar license.
# Leave the steam_webApiKey unset unless you specifically need Steam identifiers.
# set steam_webApiKey "YOUR_STEAM_WEB_API_KEY"

# ── OneSync ──────────────────────────────────────────────────────────────────
# Enable onesync for large server populations (requires Patreon)
# set onesync on

# ── Convars available to all resources ───────────────────────────────────────
setr locale "en"
set xprp_debug "false"

# =============================================================================
# Resources
# =============================================================================

# ── Database driver ──────────────────────────────────────────────────────────
ensure oxmysql

# ── Core framework ───────────────────────────────────────────────────────────
ensure xprp-core

# ── Essential utilities ──────────────────────────────────────────────────────
ensure spawnmanager

# ── Gameplay scripts ─────────────────────────────────────────────────────────
ensure xprp-hud
ensure xprp-inventory
ensure xprp-jobs
ensure xprp-factions

# =============================================================================
# Permissions / ACE
# =============================================================================

add_ace group.admin command allow
add_ace group.admin command.quit allow
add_ace group.admin xprp.faction.state allow   # admins can join/assign state factions
add_principal identifier.license:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx group.admin   # replace with your Rockstar license hex (the 40-char hex that follows "license:" in your identifier)
